<!DOCTYPE html>
<html lang="zh-Hans" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - ACG游戏姬</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .article-detail { margin-top: 80px; padding: 2rem 0; }
        .article-header { text-align: center; margin-bottom: 2rem; }
        .article-header h1 { font-size: 1.8rem; font-weight: 800; }
        .article-meta-bar {
            display: flex; justify-content: center; gap: 1.5rem;
            font-size: 0.85rem; color: var(--bs-gray-600); margin-top: 1rem;
            flex-wrap: wrap;
        }
        .article-cover {
            width: 100%; max-height: 400px; object-fit: cover;
            border-radius: 12px; margin-bottom: 2rem;
        }
        .article-cover-placeholder {
            width: 100%; height: 300px; border-radius: 12px; margin-bottom: 2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .article-cover-placeholder i { font-size: 4rem; color: rgba(255,255,255,0.6); }
        .article-body {
            font-size: 1rem; line-height: 1.8; color: var(--bs-body-color);
            padding: 1.5rem; border-radius: 12px;
            background: var(--card-bg); border: 1px solid var(--card-border);
        }
        .article-body p { margin-bottom: 1rem; }
        .article-footer {
            margin-top: 2rem; padding: 1.5rem; border-radius: 12px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem;
        }
        .download-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #9B59B6);
            color: #fff; font-weight: 700; font-size: 1rem;
            transition: all 0.3s;
        }
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(216,124,255,0.4); color: #fff; }
        .back-link { color: var(--bs-body-color); font-size: 0.9rem; }
        .back-link:hover { color: var(--accent); }
        .loading-detail { text-align: center; padding: 5rem 0; }
        .loading-detail i { font-size: 3rem; color: var(--accent); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="boxmoe_header">
        <nav class="navbar navbar-expand-lg w-100">
            <div class="container">
                <a class="navbar-brand" href="/"><span class="text-inverse">ACG游戏姬</span></a>
                <a href="/" class="back-link"><i class="fa fa-arrow-left me-1"></i>返回首页</a>
            </div>
        </nav>
    </header>

    <section class="article-detail container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- 加载中 -->
                <div class="loading-detail" id="loadingDetail">
                    <i class="fa fa-spinner fa-spin"></i>
                    <p class="mt-2">加载中...</p>
                </div>

                <!-- 文章内容 -->
                <div id="articleContent" style="display:none;">
                    <div class="article-header">
                        <h1 id="articleTitle"></h1>
                        <div class="article-meta-bar">
                            <span><i class="fa fa-dot-circle-o" style="color:var(--accent);"></i> <span id="articleCategory"></span></span>
                            <span><i class="fa fa-user"></i> <span id="articleAuthor"></span></span>
                            <span><i class="fa fa-calendar"></i> <span id="articleDate"></span></span>
                            <span><i class="fa fa-street-view"></i> <span id="articleViews"></span> 次浏览</span>
                            <span><i class="fa fa-comments-o"></i> <span id="articleComments"></span> 条评论</span>
                        </div>
                    </div>

                    <div class="article-cover-placeholder" id="articleCover">
                        <i class="fa fa-gamepad" id="coverIcon"></i>
                    </div>

                    <div class="article-body" id="articleBody">
                        <p id="articleDescription"></p>
                        <hr>
                        <h5>📥 下载说明</h5>
                        <p>请点击下方下载按钮进入下载页面。解压密码见网站底部。</p>
                        <p class="text-muted small">文件较大，建议使用下载工具以获取更快速度。</p>
                    </div>

                    <div class="article-footer">
                        <span><i class="fa fa-info-circle" style="color:var(--accent);"></i> 解压密码: acgyxj.xyz / acgyxj.cc / acgyxj.top</span>
                        <a class="download-btn" id="downloadLink" href="#" target="_blank">
                            <i class="fa fa-cloud-download"></i>前往下载页面
                        </a>
                    </div>
                </div>

                <!-- 404 -->
                <div id="article404" style="display:none;" class="text-center py-5">
                    <i class="fa fa-frown-o" style="font-size:3rem;color:var(--bs-gray-600);"></i>
                    <h4 class="mt-3">文章不存在</h4>
                    <a href="/" class="btn btn-accent mt-3">返回首页</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const postId = parseInt(params.get('id'));

            if (!postId) {
                document.getElementById('loadingDetail').style.display = 'none';
                document.getElementById('article404').style.display = 'block';
                return;
            }

            fetch('/data/posts.json')
                .then(r => r.json())
                .then(data => {
                    const post = data.posts.find(p => p.id === postId);
                    if (!post) {
                        document.getElementById('loadingDetail').style.display = 'none';
                        document.getElementById('article404').style.display = 'block';
                        return;
                    }

                    document.title = post.title + ' - ACG游戏姬';
                    document.getElementById('articleTitle').textContent = post.title;
                    document.getElementById('articleCategory').textContent = post.category;
                    document.getElementById('articleAuthor').textContent = post.author;
                    document.getElementById('articleDate').textContent = post.date;
                    document.getElementById('articleViews').textContent = post.views;
                    document.getElementById('articleComments').textContent = post.comments;
                    document.getElementById('articleDescription').textContent = post.description;
                    document.getElementById('downloadLink').href = post.link;

                    // 封面图
                    const cover = document.getElementById('articleCover');
                    cover.style.background = post.gradient || 'linear-gradient(135deg,#D87CFF,#9B59B6)';
                    document.getElementById('coverIcon').className = 'fa ' + (post.icon || 'fa-gamepad');

                    document.getElementById('loadingDetail').style.display = 'none';
                    document.getElementById('articleContent').style.display = 'block';
                })
                .catch(err => {
                    document.getElementById('loadingDetail').innerHTML =
                        '<p style="color:red;">加载失败: ' + err.message + '</p>';
                });
        });
    </script>
</body>
</html>
